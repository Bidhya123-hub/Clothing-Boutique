<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Hub</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
}

/* Header */
header{
    background:#111;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

/* Menu */
nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-size:16px;
}

nav ul li a:hover{
    color:#ff4081;
}

/* Banner */
.banner{
    background:url("https://images.unsplash.com/photo-1445205170230-053b83016050") center/cover;
    height:400px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:40px;
    font-weight:bold;
}

/* Featured Section */
.featured{
    padding:40px;
    text-align:center;
}

.products{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.product{
    border:1px solid #ddd;
    padding:15px;
    width:200px;
    transition:0.3s;
}

.product:hover{
    transform:scale(1.05);
}

.product img{
    width:100%;
}

.product h3{
    margin:10px 0;
}

.price{
    color:#ff4081;
    font-weight:bold;
}

/* Footer */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}
</style>
</head>

<body>

<!-- Header -->
<header>
<div class="logo">Fashion Hub</div>

<nav>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Shop</a></li>
<li><a href="#">Boys</a></li>
<li><a href="#">Girls</a></li>
</ul>
</nav>
</header>

<!-- Banner -->
<section class="banner">
New Fashion Collection
</section>

<!-- Featured Products -->
<section class="featured">
<h2>Featured Products</h2>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<h3>Boys Jacket</h3>
<p class="price">$25</p>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1520975922284-9e0ce82759c8">
<h3>Girls Dress</h3>
<p class="price">$30</p>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<h3>Boys T-Shirt</h3>
<p class="price">$18</p>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1492707892479-7bc8d5a4ee93">
<h3>Girls Fashion Top</h3>
<p class="price">$22</p>
</div>

</div>
</section>

<!-- Footer -->
<footer>
<p>© 2026 Fashion Hub | All Rights Reserved</p>
</footer>

</body>
</html>
